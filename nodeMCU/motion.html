<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Motion Detection System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .motion-card {
            padding: 40px;
            text-align: center;
            background: #f8f9fa;
        }

        .status-icon {
            width: 150px;
            height: 150px;
            margin: 0 auto 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .no-motion .status-icon {
            background: #2ecc71;
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.3);
        }

        .motion-detected .status-icon {
            background: #e74c3c;
            box-shadow: 0 0 50px rgba(231, 76, 60, 0.6);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7);
            }
            70% {
                transform: scale(1.05);
                box-shadow: 0 0 0 20px rgba(231, 76, 60, 0);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(231, 76, 60, 0);
            }
        }

        .status-icon svg {
            width: 80px;
            height: 80px;
            fill: white;
        }

        .status-text {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .no-motion .status-text {
            color: #2ecc71;
        }

        .motion-detected .status-text {
            color: #e74c3c;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .subtitle {
            color: #666;
            font-size: 16px;
            margin-top: 10px;
        }

        .info-panel {
            padding: 20px 30px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: 600;
            color: #555;
        }

        .info-value {
            color: #333;
            font-family: monospace;
            font-size: 16px;
        }

        .timestamp {
            background: #f8f9fa;
            padding: 15px;
            text-align: center;
            font-size: 14px;
            color: #666;
            border-top: 1px solid #e0e0e0;
        }

        .alert-banner {
            background: #e74c3c;
            color: white;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            transform: translateY(-100%);
            transition: transform 0.3s ease;
        }

        .alert-banner.show {
            transform: translateY(0);
        }

        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 15px;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #2980b9;
        }

        @media (max-width: 768px) {
            .status-text {
                font-size: 28px;
            }
            
            .status-icon {
                width: 120px;
                height: 120px;
            }
            
            .status-icon svg {
                width: 60px;
                height: 60px;
            }
            
            .container {
                margin: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚨 Motion Detection System</h1>
            <p>Real-time motion monitoring</p>
        </div>

        <div id="alertBanner" class="alert-banner">
            ⚠️ MOTION DETECTED! ⚠️
        </div>

        <div class="motion-card" id="motionCard">
            <div class="status-icon" id="statusIcon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                </svg>
            </div>
            <div class="status-text" id="statusText">NO MOTION</div>
            <div class="subtitle" id="subtitle">Area is secure</div>
        </div>

        <div class="info-panel">
            <div class="info-row">
                <span class="info-label">📊 Current Status:</span>
                <span class="info-value" id="currentStatus">Safe</span>
            </div>
            <div class="info-row">
                <span class="info-label">⏰ Last Detection:</span>
                <span class="info-value" id="lastDetection">Never</span>
            </div>
            <div class="info-row">
                <span class="info-label">📈 Detections Today:</span>
                <span class="info-value" id="detectionCount">0</span>
            </div>
            <div class="info-row">
                <span class="info-label">🕐 Last Updated:</span>
                <span class="info-value" id="lastUpdated">--:--:--</span>
            </div>
        </div>

        <div class="timestamp">
            <button onclick="testMotion()">🔔 Test Motion Alert</button>
            <button onclick="resetCounter()" style="margin-left: 10px; background: #95a5a6;">🔄 Reset Counter</button>
            <div style="margin-top: 10px; font-size: 12px;">
                System monitoring in real-time
            </div>
        </div>
    </div>

    <script>
        let detectionCount = 0;
        let isMotionDetected = false;
        let lastDetectionTime = null;
        let audioContext = null;
        
        // Function to play alert sound
        function playAlertSound() {
            if (audioContext === null) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 800;
            gainNode.gain.value = 0.3;
            
            oscillator.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 1);
            oscillator.stop(audioContext.currentTime + 1);
        }
        
        // Function to update UI based on motion status
        function updateMotionUI(motionDetected) {
            const motionCard = document.getElementById('motionCard');
            const statusIcon = document.getElementById('statusIcon');
            const statusText = document.getElementById('statusText');
            const subtitle = document.getElementById('subtitle');
            const currentStatus = document.getElementById('currentStatus');
            const alertBanner = document.getElementById('alertBanner');
            
            if (motionDetected) {
                // Motion detected state
                motionCard.className = 'motion-card motion-detected';
                statusText.innerHTML = '⚠️ MOTION DETECTED! ⚠️';
                subtitle.innerHTML = 'Movement detected in the area!';
                currentStatus.innerHTML = '🔴 Motion Detected';
                currentStatus.style.color = '#e74c3c';
                currentStatus.style.fontWeight = 'bold';
                alertBanner.classList.add('show');
                
                // Play sound
                playAlertSound();
                
                // Flash page title
                let originalTitle = document.title;
                let flashInterval = setInterval(() => {
                    document.title = document.title === originalTitle ? '⚠️ MOTION DETECTED! ⚠️' : originalTitle;
                }, 500);
                
                // Stop flashing after 3 seconds
                setTimeout(() => {
                    clearInterval(flashInterval);
                    document.title = originalTitle;
                }, 3000);
                
            } else {
                // No motion state
                motionCard.className = 'motion-card no-motion';
                statusText.innerHTML = '✓ NO MOTION';
                subtitle.innerHTML = 'Area is secure';
                currentStatus.innerHTML = '🟢 Safe';
                currentStatus.style.color = '#2ecc71';
                currentStatus.style.fontWeight = 'normal';
                alertBanner.classList.remove('show');
            }
        }
        
        // Function to simulate motion detection (for testing)
        function testMotion() {
            triggerMotionDetection();
            setTimeout(() => {
                clearMotion();
            }, 3000);
        }
        
        // Function to trigger motion detection
        function triggerMotionDetection() {
            if (!isMotionDetected) {
                isMotionDetected = true;
                lastDetectionTime = new Date();
                detectionCount++;
                
                updateMotionUI(true);
                updateInfoPanel();
                
                // Auto-clear motion after 5 seconds (simulate real sensor)
                setTimeout(() => {
                    if (isMotionDetected) {
                        clearMotion();
                    }
                }, 5000);
            }
        }
        
        // Function to clear motion
        function clearMotion() {
            if (isMotionDetected) {
                isMotionDetected = false;
                updateMotionUI(false);
                updateInfoPanel();
            }
        }
        
        // Function to update info panel
        function updateInfoPanel() {
            const lastDetectionElem = document.getElementById('lastDetection');
            const detectionCountElem = document.getElementById('detectionCount');
            const lastUpdatedElem = document.getElementById('lastUpdated');
            
            if (lastDetectionTime) {
                lastDetectionElem.innerHTML = lastDetectionTime.toLocaleTimeString();
            } else {
                lastDetectionElem.innerHTML = 'Never';
            }
            
            detectionCountElem.innerHTML = detectionCount;
            lastUpdatedElem.innerHTML = new Date().toLocaleTimeString();
        }
        
        // Function to reset counter
        function resetCounter() {
            detectionCount = 0;
            updateInfoPanel();
            
            // Add visual feedback
            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.innerHTML = '✓ Reset!';
            setTimeout(() => {
                btn.innerHTML = originalText;
            }, 1000);
        }
        
        // Simulate real sensor data (replace with actual API calls)
        function simulateSensorData() {
            // Random motion detection (20% chance every 10 seconds for demo)
            // In real implementation, replace this with fetch to your NodeMCU API
            const random = Math.random();
            if (random < 0.2 && !isMotionDetected) {
                triggerMotionDetection();
            } else if (random > 0.8 && isMotionDetected) {
                clearMotion();
            }
            
            updateInfoPanel();
        }
        
        // Real API integration (uncomment and modify for your NodeMCU)
        async function fetchMotionStatus() {
            try {
                // Replace with your NodeMCU IP address
                const response = await fetch('http://YOUR_NODEMCU_IP/motion');
                const data = await response.json();
                
                if (data.motionDetected && !isMotionDetected) {
                    triggerMotionDetection();
                } else if (!data.motionDetected && isMotionDetected) {
                    clearMotion();
                }
                
                updateInfoPanel();
            } catch (error) {
                console.log('Error fetching motion status:', error);
                // Fallback to simulation if NodeMCU not connected
                simulateSensorData();
            }
        }
        
        // Initialize the page
        function init() {
            updateMotionUI(false);
            updateInfoPanel();
            
            // For demo: simulate sensor data every 5 seconds
            // Replace with fetchMotionStatus() for real NodeMCU integration
            setInterval(simulateSensorData, 5000);
            
            // For real NodeMCU, uncomment below:
            // setInterval(fetchMotionStatus, 2000);
        }
        
        // Start the application
        init();
        
        // Add keyboard shortcut for testing (press 'M' key)
        document.addEventListener('keydown', function(e) {
            if (e.key === 'm' || e.key === 'M') {
                testMotion();
            }
        });
        
        // Add console instructions
        console.log('Motion Detection UI Loaded');
        console.log('Press "M" key to test motion alert');
        console.log('For real NodeMCU integration, update the IP address in fetchMotionStatus()');
    </script>
</body>
</html>
